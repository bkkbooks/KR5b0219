body:
  text: 向東九地禮懴臣等至心歸命第一壘色潤地第一土皇君再拜叩頭五心懴竟齊起大災重病散髮叩頭不須搏頰臣某等上啓太上無無至眞無上無爲大道應感眞精第一壘色潤地第一土皇君原缺諱今有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恒道慕堯舜旣纉承於大業毎省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱澇之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依土皇委命至眞𢹂請臣等建三皇中元祈請大齋臣等誠愚誠魯非賛大猷之人特念巳叨巳忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽闇招引神明爲某摽露眞文揚旛請命披心散髮謝過自新伏願土皇君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道達神氣和合靈官衛護某身原赦宿新無量罪咎矜奬即今改悔丹誠以是功德歸流某七廟之靈九玄七祖一切先亡同得離幽苦上昇福堂轉輪成眞利祐見在使陵廟墳基肅寜殃注斷絶宫宅安穩恠夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即蒙差愈或官司盜賊即得免過隨事言之衆災度脫夀命延長皇家道德日盛四海災消禎祥雲集八節安和一切羣生咸蒙福慶俱服正教同歸自然得道之後與皇合眞畢依次禮三十六易朱字諱餘異同依三十六天臣某等上啓太上無無至眞無上無爲大道應感眞精第一壘色潤地第二土皇君諱黄昌上文波泥今有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恒道慕堯舜旣纉承於大業毎省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱澇之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依土皇委命至眞𢹂請臣等建三皇中元祈請大齋臣等誠愚誠魯非賛大猷之人特念巳叨巳忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽闇招引神明爲某摽露眞文揚旛請命披心散髮謝過自新伏願土皇君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道達神氣和合靈官衛護某身原赦宿新無量罪咎矜奬即今改悔丹誠以是功德歸流某七廟之靈九玄七祖一切先亡同得離幽苦上昇福堂轉輪成眞利祐見在使陵廟墳基肅寧殃注斷絶宫宅安穩恠夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即蒙差愈或官司盜賊即得免過隨事言之衆災度脫夀命延長皇家道德日盛四海災消禎祥雲集八節安和一切羣生咸蒙福慶俱服正教同歸自然得道之後與皇合眞臣某等上啓太上無無至眞無上無爲大道應感眞精第一壘色潤地第三土皇君諱青玄文其久難今有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恒道慕堯舜旣纉承於大業毎省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱澇之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至回向大道歸依土皇委命至眞擕請臣等建三皇中元祈請大齋臣等誠愚誠魯非賛大猷之人特念巳叨巳忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽闇招引神明爲某摽露眞文揚旛請命披心散髮謝過自新伏願土皇君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道逹神氣和合靈官衛護某身原赦宿新無量罪咎矜奬即今改悔丹誠以是功德歸流某七廟之靈九玄七祖一切先亡同得離幽苦上昇福堂轉輪成眞利祐見在使陵廟墳基肅寧殃注斷絶宮宅安穩恠夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即蒙差愈或官司盜賊即得免過隨事言之衆災度脫夀命延長皇家道德日盛四海災消禎祥雲集八節安和一切羣生咸蒙福慶俱服正教同歸自然得道之後與皇合眞臣某等上啓太上無無至眞無上無爲大道應感眞精第一壘色潤地第四土皇君諱蜚陳忠皇今有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恒道慕堯舜旣纉承於大業毎省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱澇之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依土皇委命至眞𢹂請臣等建三皇中元祈請大齋臣等誠愚誠魯非賛大猷之人特念巳叨巳忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽闇招引神明爲某摽露眞文揚旛請命披心散髮謝過自新伏願土皇君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道達神氣和合靈官衞護某身原赦宿新無量罪咎矜奬即今改悔丹誠以是功德歸流某七廟之靈九玄七祖一切先亡同得離幽苦上昇福堂轉輪成眞利祐見在使陵廟墳基肅寧殃注斷絶宫宅安穩恠夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即蒙差愈或官司盜賊即得免過隨事言之衆災度脫壽命延長皇家道德日盛四海災消禎祥雲集八節安和一切羣生咸蒙福慶俱服正敎同歸自然得道之後與皇合眞臣某等上啓太上無無至眞無上無爲大道應感眞精第二壘剛色地第五土皇君諱戊神文光今有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恒道慕堯舜旣纉承於大業毎省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱澇之所災或民庶之多難覩此