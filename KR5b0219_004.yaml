body:
  text: 向北九地禮懴臣等至心歸命第七壘水制澤地第二十八土皇君臣某等上啓太上無無至真無上無為大道應感真精第七壘水制澤地第二十八土皇君諱京仲龍首今有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恆道慕堯舜既纘承於大業每省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱潦之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依土皇委命至真攜請臣等建三皇中元祈請大齋臣等誠愚誠魯非贊大猷之人特念已叨已忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽暗招引神明為某摽露真文揚幡請命披心散髮謝過自新伏願土皇君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道達神氣和合靈官衛護某身原赦宿新無量罪咎矜獎即今攺悔丹誠以是功德歸流某七廟之靈九玄七祖一切先亡同得離幽苦上升福堂轉輪成真利祐見在使陵廟墳基肅寧殃注斷絶宫宅安穩怪夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即蒙差愈或官司盜賊即得免過隨事言之衆災度脫壽命延長皇家道德日盛四海災消禎祥雲集八節安和一切羣生咸蒙福慶俱服正教同歸自然得道之後與皇合真臣某等上啓太上無無至真無上無為大道應感真精第八壘大風澤地第二十九土皇君諱葛玄外先今有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恆道慕堯舜既纘承於大業每省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱潦之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依土皇委命至真攜請臣等建三皇中元祈請大齋臣等誠愚誠魯非贊大猷之人特念巳叨巳忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽暗招引神明為某摽露真文揚幡請命披心散髮謝過自新伏願土皇君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道達神氣和合靈官衛護某身原赦宿新無量罪咎矜獎即今攺悔丹誠以是功德歸流某七廟之靈九玄士祖一切先亡同得離幽苦上升福堂轉輪成真利祐見在使陵廟墳基肅寧殃注斷絶官宅安穩怪夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即得差愈或官司盜賊即得免過隨事言之衆災度脫壽命延長皇家道德日盛四海災消禎祥雲集八節安和一切羣生咸蒙福慶俱服正教同歸自然得道之後與皇合真臣某等上啓太上無無至真無上無為大道應感真精第八壘大風澤地第三十土皇君諱華茂雲長今有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恆道慕堯舜既纘承於大業每省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱潦之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依土皇委命至真攜請臣等建三皇中元祈請大齋臣等誠愚誠魯非贊大猷之人特念巳叨巳忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽暗招引神明為某摽露真文揚幡請命披心散髮謝過自新伏願土皇君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道達神氣和合靈官衛護某身原赦宿新無量罪咎矜獎即今攺悔丹誠以是功德歸流某七廟之靈九玄七祖一切先亡同得離幽苦上升福堂轉輪成真利祐見在使陵廟墳基肅寧𣧎注斷絶官宅安穩怪夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即蒙差愈或官司盜賊即得免過隨事言之衆災度脫壽命延長皇家道德日盛四海災消禎祥雲集八節安和一切羣生咸蒙福慶俱服正教同歸自然得道之後與皇合真臣某等上啓太上無無至真無上無為大道應感真精第八壘大風澤地第三十一土皇君諱羊真洞玄今有當今皇帝遇荷玄恩幸藉餘慶屬當萬機臨億兆任重嵩恆道慕堯舜既纘承於大每省惕於眇躬道俗凌夷淳化難振隂翊資於鴻覆生靈曷遂於燕安或旱潦之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依土皇委命至真攜請臣等建三皇中元祈請大齋臣等誠愚誠魯非贊大猷之人特念巳叨己忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽暗招引神明為某摽露真文揚幡請命披心散髮謝過自新伏願土皇君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道達神氣和合靈官衛護某身原赦宿新無量罪咎矜獎即今攺悔丹誠以是功德歸流某七廟之靈九玄七祖一切先亡同得離幽苦上升福堂轉輪成真利祐見在使陵廟墳基肅寧殃注斷絶宫宅安穩怪夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即蒙差愈或官司盜賊即得免過隨事言之衆災度脫壽命延長皇家道德日盛四海災消禎祥雲集八節安和一切羣生咸蒙福慶俱服正教同歸自然得道之後與皇合真臣某等上啓太上無無至真無上無為大道應感真精第八壘大風澤地第三十二土皇君諱周尚敬原今有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恆道慕堯舜既纘承於大業每省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱潦之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依